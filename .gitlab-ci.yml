stages:
  - build
  - test

maven-build:
  stage: build
  image: maven:3.9.3-eclipse-temurin-17
  script:
    - mvn clean compile

# Test specifici per la classe Player
test-player:
  stage: test
  image: maven:3.9.3-eclipse-temurin-17
  script:
    - mvn test -Dtest=PlayerTest
  artifacts:
    when: always
    reports:
      junit:
        - target/surefire-reports/TEST-com.monopoly.PlayerTest.xml
    paths:
      - target/surefire-reports/
    expire_in: 1 week

# Test specifici per la classe Bank
test-bank:
  stage: test
  image: maven:3.9.3-eclipse-temurin-17
  script:
    - mvn test -Dtest=BankTest
  artifacts:
    when: always
    reports:
      junit:
        - target/surefire-reports/TEST-com.monopoly.BankTest.xml
    paths:
      - target/surefire-reports/
    expire_in: 1 week